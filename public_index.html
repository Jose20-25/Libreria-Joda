<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería JODA - Despliegue en Progreso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .status {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Librería JODA</h1>
        <p style="font-size: 1.2em; color: #666; margin-bottom: 30px;">
            Sistema de Gestión Empresarial
        </p>
        
        <div class="status">
            <h3 style="margin-bottom: 10px;">🚀 Configuración en Progreso</h3>
            <p>El backend se está configurando en Render.com</p>
        </div>
        
        <a href="INSTRUCCIONES_DESPLIEGUE_GRATIS.html" class="btn">
            📋 Ver Instrucciones Completas
        </a>
        <a href="https://render.com/docs/deploy-flask" class="btn" target="_blank">
            📖 Guía de Render
        </a>
    </div>
</body>
</html>
