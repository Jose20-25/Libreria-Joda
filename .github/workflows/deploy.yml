name: Deploy to GitHub Pages and Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Pages
        uses: actions/configure-pages@v3
      
      - name: Prepare files
        run: |
          mkdir -p public
          cp -r app/static/* public/ || true
          cp public_index.html public/index.html || true
          echo "Archivos preparados para GitHub Pages"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './public'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  notify:
    needs: deploy-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deployment complete
        run: |
          echo "Desplegado en: https://jose20-25.github.io/Libreria-Joda/"
          echo "Backend en Render: Configurar manualmente"
