services:
  - type: web
    name: libreria-joda
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn libreria_joda.wsgi --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_SSL
        value: True
      - key: DATABASE_URL
        fromDatabase:
          name: libreria-joda-db
          property: connectionString
      - key: FIREBASE_STORAGE_BUCKET
        value: tiendajoda-c73c4.firebasestorage.app
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.12

databases:
  - name: libreria-joda-db
    databaseName: libreria_joda
    user: libreria_joda
